services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: auth_system_db
      MYSQL_ROOT_PASSWORD: 12345
    ports:
      - "3306:3306"

  app:
    build: .
    ports:
      - "8081:8081"
    depends_on:
      - db
    environment:
      DB_URL: jdbc:mysql://db:3306/auth_system_db
      DB_USER: root
      DB_PASSWORD: 12345