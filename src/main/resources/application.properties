spring.application.name=authsystem
spring.datasource.url=jdbc:mysql://localhost:3306/auth_system_db
spring.datasource.username=root
spring.datasource.password=12345

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# optional but recommended
spring.jpa.open-in-view=false



# JWT (custom properties)

app.jwt.secret=dev_secret_dev_secret_dev_secret_dev_secret_123456
app.jwt.access-exp-min=15
app.jwt.refresh-exp-days=7



#flyway

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

logging.level.org.flywaydb=DEBUG




# SWAGGER / OPENAPI(springdoc)

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html


# ACTUATOR (health check)

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always


# LOGGING

logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG